mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false

dns:
  enable: true
  ipv6: false
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback:
    - 8.8.4.4
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - localhost.ptlogin2.qq.com

proxies: []

proxy-groups:
  - name: "\U0001F680 Автовыбор"
    type: url-test
    proxies: []
    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50

  - name: "\U0001F530 Основной"
    type: select
    proxies:
      - "\U0001F680 Автовыбор"

